<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notifications - Bake King</title>
    <link rel="stylesheet" href=".css/notifications.css">
    <link rel="stylesheet" href=".css/header.css">
    <link rel="stylesheet" href=".css/global.css">

    <script type="module" src=".js/inject-components.js"></script>
    <script type="module" src=".js/header.js"></script>
    <script type="module" src=".js/notifications.js"></script>

</head>
<body>
    <div id="header-placeholder"></div>

    <main class="notif-main">
        <div class="notif-page-header">
            <div class="notif-title-row">
                <h1 class="notif-title">MY <span>ALERTS</span></h1>
                <p>Stay updated on your fresh bakes and orders</p>
            </div>
            <div class="notif-header-actions">
                <span class="notif-unread-count" id="notifUnreadCount"></span>
                <button class="notif-mark-all-btn" id="markAllReadBtn">Mark all as read</button>
            </div>
        </div>

        <div class="notif-tabs" id="notifTabs">
            <button class="notif-tab notif-tab-active" data-filter="all">All</button>
            <button class="notif-tab" data-filter="status_change">Updates</button>
            <button class="notif-tab" data-filter="general">General</button>
        </div>

        <div class="notif-list" id="customerNotifList">
            <p class="notif-empty">Loading your updates...</p>
        </div>

        <div class="notif-load-more-container" id="loadMoreContainer">
            <button class="notif-load-more-btn" id="loadMoreBtn">
                Load more notifications
                <span class="btn-icon">↓</span>
            </button>
        </div>
    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
